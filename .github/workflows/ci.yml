name: CI

# Runs on pull requests only — checks lint/format and that the app builds.
# Deployment is a separate, manually-triggered workflow (deploy.yml).
on:
  pull_request:
    branches: [main]

# Cancel an in-flight run when a PR is updated with a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format check (Biome)
        run: npx @biomejs/biome ci .

      - name: Build
        run: npm run build
